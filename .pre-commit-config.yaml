# Pre-commit hooks: format with black, then lint with flake8.
#
# Activate locally (once per clone):  pre-commit install
# Run against everything on demand:    pre-commit run --all-files
#
# The `rev` versions below are the operative ones — pre-commit runs each hook
# in its own isolated environment, NOT from the project venv. Keep them in sync
# with the dev group in pyproject.toml when bumping (`pre-commit autoupdate`
# bumps these; mirror the change into pyproject).
repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
